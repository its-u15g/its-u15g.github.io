<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITS U-15 | 国際旅行社が発足させたハンドボールチーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; scroll-behavior: smooth; }
        
        /* グラデーションアニメーション（ゆっくり溶ける設定） */
        .brand-gradient {
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #6366f1);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* フェードイン用の基本設定 */
        .fade-in-hidden {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.0s ease-out, transform 1.0s ease-out;
        }
        /* 画面内に入った時の状態 */
        .fade-in-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-image-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('IMG_7967.jpg');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
        }
        .message-image-bg {
            background-image: linear-gradient(rgba(79, 70, 229, 0.85), rgba(168, 85, 247, 0.85)), url('IMG_7965.jpg');
            background-size: cover;
            background-position: center;
        }
        .contact-image-bg {
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), url('IMG_7969.jpg');
            background-size: cover;
            background-position: center;
        }
        .section-title {
            position: relative;
            display: inline-block;
            padding-bottom: 8px;
            font-weight: 900;
            font-size: 1.25rem;
            color: #1e293b;
        }
        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #6366f1, #ec4899);
            border-radius: 2px;
        }
        .staff-card {
            background: #ffffff;
            border-radius: 40px;
            padding: 2.5rem 1.5rem;
            box-shadow: 0 10px 30px -5px rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(241, 245, 249, 0.8);
        }
        .history-item {
            position: relative;
            padding-left: 1.25rem;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #475569;
        }
        .history-item::before {
            content: '■';
            position: absolute; left: 0; color: #6366f1; font-size: 10px; top: 2px;
        }
        .schedule-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 leading-relaxed">

    <div class="max-w-[480px] mx-auto bg-white min-h-screen shadow-2xl relative">

        <nav class="sticky top-0 z-[100] bg-white border-b border-slate-100 px-6 py-3 flex justify-between items-center shadow-sm">
            <div class="font-black text-xl tracking-tighter text-indigo-600">ITS U-15</div>
            <a href="#contact" class="bg-indigo-600 text-white text-[10px] font-black px-4 py-2 rounded-full active:scale-95 transition-transform">体験申込</a>

                <h1 class="text-3xl font-black leading-tight tracking-tighter mb-4 drop-shadow-lg">ハンドボールで<br>沖縄の未来をつなぐ</h1>

                    <p class="text-[10px] font-black uppercase mb-1">supported by</p>
                    <p class="text-sm font-black border-t border-white/30 pt-1">株式会社 国際旅行社</p>
                </div>
            </div>
        </header>

        <section class="py-12 px-8 bg-white fade-in-hidden">
            <div class="text-center mb-10">
                <h2 class="section-title">創部の背景</h2>
            </div>
            <div class="space-y-6">
                <div class="border-l-4 border-indigo-500 pl-4">
                    <h3 class="text-sm font-black text-indigo-700 mb-2">少子化と働き方改革、<br>部活動を巡る環境の変化</h3>

                </div>
            </div>

                <h2 class="section-title">チーム概要</h2>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-start space-x-4">
                    <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-bullseye"></i></div>
                    <div><h4 class="font-black text-indigo-600 text-sm">趣旨</h4><p class="text-xs font-bold text-slate-600">ハンドボールを継続して親しむ機会を確保します。</p></div>
                </div>
            </div>
        </section>

        <section class="py-16 px-6 bg-white fade-in-hidden">
            <div class="text-center mb-10"><h2 class="section-title">
